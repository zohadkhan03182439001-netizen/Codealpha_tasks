<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Project Gallery</h1>

    <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="nature">Nature</button>
        <button class="filter-btn" data-filter="architecture">Architecture</button>
        <button class="filter-btn" data-filter="animals">Animals</button>
    </div>

    <div class="gallery-grid">
        <div class="gallery-item" data-category="nature">
            <img src="https://picsum.photos/id/10/800/600" alt="Mountain Lake">
            <div class="overlay"><span>View</span></div>
        </div>
        <div class="gallery-item" data-category="nature">
            <img src="https://picsum.photos/id/28/800/600" alt="Forest Path">
            <div class="overlay"><span>View</span></div>
        </div>
        <div class="gallery-item" data-category="architecture">
            <img src="https://picsum.photos/id/1011/800/600" alt="Bay Bridge">
            <div class="overlay"><span>View</span></div>
        </div>
        <div class="gallery-item" data-category="architecture">
            <img src="https://picsum.photos/id/1031/800/600" alt="Old House">
            <div class="overlay"><span>View</span></div>
        </div>
        <div class="gallery-item" data-category="animals">
            <img src="https://picsum.photos/id/582/800/600" alt="Coyote">
            <div class="overlay"><span>View</span></div>
        </div>
        <div class="gallery-item" data-category="animals">
            <img src="https://picsum.photos/id/659/800/600" alt="Husky">
            <div class="overlay"><span>View</span></div>
        </div>
    </div>
</div>

<div class="lightbox" id="lightbox">
    <div class="lightbox-content">
        <span class="close-btn" id="closeBtn">&times;</span>
        <button class="nav-btn prev-btn" id="prevBtn">&#10094;</button>
        <img src="" alt="Popup Image" id="lightboxImg">
        <button class="nav-btn next-btn" id="nextBtn">&#10095;</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

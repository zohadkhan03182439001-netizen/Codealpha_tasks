<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Audio Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-container">
        <audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
        
        <div class="track-info">
            <h2 id="title">Song Title</h2>
            <h3 id="artist">Artist Name</h3>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="time-stamps">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
        </div>

        <div class="controls">
            <button id="prev" class="control-btn">⏮</button>
            <button id="play" class="control-btn play-btn">▶</button>
            <button id="next" class="control-btn">⏭</button>
        </div>

        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="volume" min="0" max="1" step="0.05" value="0.7">
            <span>🔊</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
